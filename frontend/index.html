<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedConnect — Encuentra tu médico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=1" />
  </head>
  <body>

    <!-- ── TOP NAV BAR ───────────────────────────────────────── -->
    <header>
      <div class="header-left">
        <span class="logo">MedConnect</span>
        <span class="nav-sep">//</span>
        <span class="header-breadcrumb">Plataforma Médica Inteligente</span>
      </div>
      <div class="header-right">
        <span class="header-tag">IA + Gemini</span>
        <div class="header-status" id="api-status">
          <span class="material-symbols-outlined">fiber_manual_record</span>
          <span>CONECTANDO...</span>
        </div>
        <div class="user-chip" id="user-chip">P</div>
      </div>
    </header>

    <!-- ── WORKSPACE ─────────────────────────────────────────── -->
    <div class="workspace">

      <!-- ── LEFT PANEL — Symptoms + Form ───────────────────── -->
      <div class="chat-left">
        <div class="chat-left-header">
          <div class="chat-left-title">
            <span class="material-symbols-outlined">medical_services</span>
            <span>Consulta</span>
          </div>
          <span class="status-badge badge-active" id="chat-mode-badge">TRIAJE IA</span>
        </div>

        <!-- Messages area -->
        <div class="chat-messages" id="chat-messages"></div>

        <!-- Patient form (shown before first consult) -->
        <div id="patient-form">
          <div class="form-group">
            <label>Seguro médico</label>
            <select id="insurance-select">
              <option value="imss">IMSS</option>
              <option value="issste">ISSSTE</option>
              <option value="seguro_popular">Seguro Popular</option>
              <option value="ninguno" selected>Sin seguro</option>
            </select>
          </div>
          <div class="form-group">
            <label>Presupuesto</label>
            <div class="budget-selector">
              <button class="budget-btn" data-val="$">$</button>
              <button class="budget-btn active" data-val="$$">$$</button>
              <button class="budget-btn" data-val="$$$">$$$</button>
            </div>
          </div>
        </div>

        <!-- Chat input -->
        <div class="chat-input-row">
          <input type="text" id="chat-input" class="chat-input"
            placeholder="Describe tus síntomas..." autocomplete="off" />
          <button id="chat-send-btn" class="chat-send-btn">
            <span class="material-symbols-outlined">send</span>
          </button>
        </div>
      </div>

      <!-- ── MAP AREA ─────────────────────────────────────────── -->
      <div class="map-wrap">

        <div id="map-container">
          <div class="map-loading" id="map-loading">
            <span class="material-symbols-outlined">local_hospital</span>
            <span>BUSCANDO CLÍNICAS CERCANAS...</span>
          </div>
        </div>

        <!-- Search HUD -->
        <div class="search-hud">
          <span class="material-symbols-outlined search-ico">my_location</span>
          <input type="text" id="map-search-input"
            placeholder="Tu ubicación actual..." />
          <button id="map-search-btn">
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </div>

        <!-- Recommendations panel (bottom overlay) -->
        <div id="recommendations-panel" class="recommendations-panel hidden">
          <div class="rec-header">
            <span class="material-symbols-outlined">recommend</span>
            <span id="rec-header-text">Opciones recomendadas</span>
            <button id="rec-close-btn" class="icon-btn">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <div id="rec-cards" class="rec-cards"></div>
        </div>

      </div><!-- /map-wrap -->

    </div><!-- /workspace -->

    <!-- ── DOCTOR CHAT MODAL ─────────────────────────────────── -->
    <div id="chat-modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-header">
          <span class="material-symbols-outlined">chat</span>
          <span id="modal-doctor-name">Chat con el Doctor</span>
          <button id="modal-close-btn" class="icon-btn">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="modal-messages" id="modal-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="modal-input" class="chat-input"
            placeholder="Escribe un mensaje..." autocomplete="off" />
          <button id="modal-send-btn" class="chat-send-btn">
            <span class="material-symbols-outlined">send</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ── SPINNER ───────────────────────────────────────────── -->
    <div id="spinner" class="hidden">
      <div class="spinner-ring"></div>
      <div class="spinner-title">Analizando con IA...</div>
    </div>

    <script src="app.js?v=1"></script>
  </body>
</html>
