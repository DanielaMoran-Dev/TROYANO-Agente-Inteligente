<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedConnect — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=1" />
  <style>
    /* ── LOGIN PAGE ── */
    html, body { height: 100%; overflow: auto; }

    .login-bg {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      padding: 2rem 1rem;
    }
    .login-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 40%, rgba(26,115,232,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 70%, rgba(120,217,236,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      width: 440px;
      max-width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      position: relative;
      z-index: 1;
    }

    .login-header {
      padding: 1.6rem 2rem 1.1rem;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .login-logo {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 6px;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .login-sub {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 2px;
    }

    /* Role selector tabs */
    .role-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .role-tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 1px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .role-tab .material-symbols-outlined { font-size: 18px; }
    .role-tab:hover { color: var(--text-2); background: var(--surface-2); }
    .role-tab.active { color: var(--blue); border-bottom-color: var(--blue); background: rgba(138,180,248,0.05); }

    .login-body { padding: 1.3rem 2rem 1.7rem; }

    /* Mode sub-tabs (Iniciar sesión / Registrarse) */
    .mode-tabs {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px;
      margin-bottom: 1.2rem;
    }
    .mode-tab {
      flex: 1;
      padding: 0.45rem;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.12s, color 0.12s;
    }
    .mode-tab.active { background: var(--surface-2); color: var(--text); }

    .mode-panel { display: none; flex-direction: column; gap: 0.8rem; }
    .mode-panel.active { display: flex; }

    .login-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .login-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .login-field label {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .login-field input,
    .login-field select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.85rem;
      padding: 0.55rem 0.7rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .login-field input:focus,
    .login-field select:focus { border-color: var(--blue); }
    .login-field input::placeholder { color: var(--disabled); }

    .btn-login {
      width: 100%;
      padding: 0.7rem;
      background: var(--blue-btn);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.12s, opacity 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }
    .btn-login:hover:not(:disabled) { background: var(--blue-btn-h); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-login .material-symbols-outlined { font-size: 18px; }

    .login-msg {
      font-family: var(--mono);
      font-size: 0.62rem;
      text-align: center;
      min-height: 1rem;
      letter-spacing: 0.5px;
      margin-top: 0.2rem;
    }
    .login-msg.err { color: var(--red); }
    .login-msg.ok  { color: #34a853; }

    .login-footer {
      padding: 0.8rem 2rem;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.55rem;
      color: var(--disabled);
      text-align: center;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
<div class="login-bg">
  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="login-logo">MEDCONNECT</div>
      <div class="login-sub">PLATAFORMA MÉDICA INTELIGENTE</div>
    </div>

    <!-- Role tabs -->
    <div class="role-tabs">
      <button class="role-tab active" id="tab-patient" onclick="switchRole('patient')">
        <span class="material-symbols-outlined">person</span>
        PACIENTE
      </button>
      <button class="role-tab" id="tab-doctor" onclick="switchRole('doctor')">
        <span class="material-symbols-outlined">stethoscope</span>
        MÉDICO
      </button>
    </div>

    <!-- Body -->
    <div class="login-body">

      <!-- Mode sub-tabs (login / register) -->
      <div class="mode-tabs">
        <button class="mode-tab active" id="mt-login" onclick="switchMode('login')">INICIAR SESIÓN</button>
        <button class="mode-tab" id="mt-register" onclick="switchMode('register')">REGISTRARSE</button>
      </div>

      <!-- ───── PATIENT · LOGIN ───── -->
      <form id="form-patient-login" class="mode-panel active" onsubmit="event.preventDefault(); patientLogin();">
        <div class="login-field">
          <label>Correo electrónico</label>
          <input type="email" id="pl-email" placeholder="tucorreo@ejemplo.com" autocomplete="email" required />
        </div>
        <div class="login-field">
          <label>Contraseña</label>
          <input type="password" id="pl-password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login" id="btn-pl">
          <span class="material-symbols-outlined">login</span>
          ENTRAR
        </button>
      </form>

      <!-- ───── PATIENT · REGISTER ───── -->
      <form id="form-patient-register" class="mode-panel" onsubmit="event.preventDefault(); patientRegister();">
        <div class="login-row">
          <div class="login-field">
            <label>Nombre</label>
            <input type="text" id="pr-name" placeholder="Carlos" maxlength="80" required />
          </div>
          <div class="login-field">
            <label>Apellido</label>
            <input type="text" id="pr-last" placeholder="Ramírez" maxlength="80" required />
          </div>
        </div>
        <div class="login-field">
          <label>Correo electrónico</label>
          <input type="email" id="pr-email" placeholder="tucorreo@ejemplo.com" autocomplete="email" required />
        </div>
        <div class="login-field">
          <label>Contraseña (mínimo 6)</label>
          <input type="password" id="pr-password" placeholder="••••••••" autocomplete="new-password" minlength="6" required />
        </div>
        <div class="login-row">
          <div class="login-field">
            <label>Edad</label>
            <input type="number" id="pr-age" min="0" max="120" placeholder="30" />
          </div>
          <div class="login-field">
            <label>Seguro</label>
            <select id="pr-insurance">
              <option value="ninguno" selected>Sin seguro</option>
              <option value="imss">IMSS</option>
              <option value="issste">ISSSTE</option>
              <option value="seguro_popular">Seguro Popular</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-login" id="btn-pr">
          <span class="material-symbols-outlined">person_add</span>
          CREAR CUENTA
        </button>
      </form>

      <!-- ───── DOCTOR · LOGIN ───── -->
      <form id="form-doctor-login" class="mode-panel" onsubmit="event.preventDefault(); doctorLogin();">
        <div class="login-field">
          <label>Correo electrónico</label>
          <input type="email" id="dl-email" placeholder="doctor@medconnect.mx" autocomplete="email" required />
        </div>
        <div class="login-field">
          <label>Contraseña</label>
          <input type="password" id="dl-password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login" id="btn-dl">
          <span class="material-symbols-outlined">login</span>
          INICIAR SESIÓN
        </button>
      </form>

      <!-- ───── DOCTOR · REGISTER ───── -->
      <form id="form-doctor-register" class="mode-panel" onsubmit="event.preventDefault(); doctorRegister();">
        <div class="login-row">
          <div class="login-field">
            <label>Nombre</label>
            <input type="text" id="dr-name" placeholder="Alejandro" maxlength="80" required />
          </div>
          <div class="login-field">
            <label>Apellido</label>
            <input type="text" id="dr-last" placeholder="Vega" maxlength="80" required />
          </div>
        </div>
        <div class="login-field">
          <label>Correo profesional</label>
          <input type="email" id="dr-email" placeholder="doctor@medconnect.mx" autocomplete="email" required />
        </div>
        <div class="login-field">
          <label>Contraseña (mínimo 6)</label>
          <input type="password" id="dr-password" placeholder="••••••••" autocomplete="new-password" minlength="6" required />
        </div>
        <div class="login-row">
          <div class="login-field">
            <label>Cédula profesional</label>
            <input type="text" id="dr-license" placeholder="12345678" minlength="4" maxlength="32" required />
          </div>
          <div class="login-field">
            <label>Especialidad</label>
            <select id="dr-specialty" required>
              <option value="medicina_general" selected>Medicina general</option>
              <option value="cardiología">Cardiología</option>
              <option value="neurología">Neurología</option>
              <option value="pediatría">Pediatría</option>
              <option value="ginecología">Ginecología</option>
              <option value="traumatología">Traumatología</option>
              <option value="dermatología">Dermatología</option>
              <option value="oftalmología">Oftalmología</option>
              <option value="otorrinolaringología">Otorrinolaringología</option>
              <option value="gastroenterología">Gastroenterología</option>
              <option value="neumología">Neumología</option>
              <option value="urología">Urología</option>
              <option value="nefrología">Nefrología</option>
              <option value="psiquiatría">Psiquiatría</option>
              <option value="endocrinología">Endocrinología</option>
            </select>
          </div>
        </div>
        <div class="login-row">
          <div class="login-field">
            <label>Nivel de precio</label>
            <select id="dr-price">
              <option value="1">$ — Público</option>
              <option value="2" selected>$$ — Privado bajo</option>
              <option value="3">$$$ — Premium</option>
            </select>
          </div>
          <div class="login-field">
            <label>Teléfono</label>
            <input type="tel" id="dr-phone" placeholder="5512345678" />
          </div>
        </div>
        <button type="submit" class="btn-login" id="btn-dr">
          <span class="material-symbols-outlined">person_add</span>
          REGISTRARME
        </button>
      </form>

      <div class="login-msg" id="login-msg"></div>

    </div>

    <div class="login-footer">IA + Gemini 2.5 Flash · Google Maps · MongoDB</div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  let currentRole = "patient";  // "patient" | "doctor"
  let currentMode = "login";    // "login" | "register"

  // Si ya hay sesión válida, redirige de una vez
  (function autoRedirect() {
    const doctor = sessionStorage.getItem("medconnect_doctor");
    const user   = sessionStorage.getItem("medconnect_user");
    if (doctor) { window.location.replace("doctor.html"); return; }
    if (user)   { window.location.replace("index.html");  return; }
  })();

  // ── UI switching ───────────────────────────────────────────────────────
  function switchRole(role) {
    currentRole = role;
    document.getElementById("tab-patient").classList.toggle("active", role === "patient");
    document.getElementById("tab-doctor").classList.toggle("active", role === "doctor");
    renderPanels();
    setMsg("", "");
  }

  function switchMode(mode) {
    currentMode = mode;
    document.getElementById("mt-login").classList.toggle("active", mode === "login");
    document.getElementById("mt-register").classList.toggle("active", mode === "register");
    renderPanels();
    setMsg("", "");
  }

  function renderPanels() {
    const map = {
      "patient-login":    "form-patient-login",
      "patient-register": "form-patient-register",
      "doctor-login":     "form-doctor-login",
      "doctor-register":  "form-doctor-register",
    };
    const activeId = map[`${currentRole}-${currentMode}`];
    Object.values(map).forEach(id => {
      document.getElementById(id).classList.toggle("active", id === activeId);
    });
  }

  function setMsg(text, kind) {
    const el = document.getElementById("login-msg");
    el.textContent = text || "";
    el.className = "login-msg" + (kind ? " " + kind : "");
  }

  // ── API helper ─────────────────────────────────────────────────────────
  async function apiCall(path, body) {
    const res = await fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    let data = null;
    try { data = await res.json(); } catch { /* no body */ }
    if (!res.ok) {
      const detail = (data && data.detail) || `Error ${res.status}`;
      throw new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
    }
    return data;
  }

  function withBusy(btnId, fn) {
    return async () => {
      const btn = document.getElementById(btnId);
      btn.disabled = true;
      try { await fn(); }
      catch (err) { setMsg(err.message || "Error desconocido", "err"); }
      finally { btn.disabled = false; }
    };
  }

  // ── Session storage ────────────────────────────────────────────────────
  function saveUserSession(user) {
    // user = backend response (UserPublic)
    sessionStorage.setItem("medconnect_user", JSON.stringify({
      user_id:    user.user_id,
      email:      user.email,
      name:       user.name,
      last_name:  user.last_name,
      full_name:  `${user.name} ${user.last_name}`.trim(),
      age:        user.age ?? null,
      phone:      user.phone ?? null,
      coords:     user.coords ?? null,
      insurance:  user.insurance ?? "ninguno",
    }));
    sessionStorage.removeItem("medconnect_doctor");
  }

  function saveDoctorSession(doctor) {
    // doctor = backend response (DoctorPublic)
    const fullName   = `Dr. ${doctor.name} ${doctor.last_name}`.trim();
    const specialty  = titleCase((doctor.specialty || "").replaceAll("_", " "));
    sessionStorage.setItem("medconnect_doctor", JSON.stringify({
      doctor_id:       doctor.doctor_id,
      id:              doctor.doctor_id,      // alias legacy
      email:           doctor.email,
      first_name:      doctor.name,
      last_name:       doctor.last_name,
      name:            fullName,              // display name para doctor.js
      specialty:       specialty,             // display (Title Case)
      specialty_raw:   doctor.specialty,      // para filtros/API
      license:         doctor.license_number, // alias legacy
      license_number:  doctor.license_number,
      price_level:     doctor.price_level,
      insurances:      doctor.insurances || [],
      is_network:      !!doctor.is_network,
      is_active:       !!doctor.is_active,
      calendar_connected: !!doctor.calendar_connected,
    }));
    sessionStorage.removeItem("medconnect_user");
  }

  function titleCase(s) {
    return (s || "").split(" ").map(w => w ? w[0].toUpperCase() + w.slice(1) : "").join(" ");
  }

  // ── Handlers ───────────────────────────────────────────────────────────
  const patientLogin = withBusy("btn-pl", async () => {
    const email    = document.getElementById("pl-email").value.trim().toLowerCase();
    const password = document.getElementById("pl-password").value;
    const user = await apiCall("/users/login", { email, password });
    saveUserSession(user);
    setMsg("Sesión iniciada. Redirigiendo...", "ok");
    window.location.replace("index.html");
  });

  const patientRegister = withBusy("btn-pr", async () => {
    const payload = {
      name:       document.getElementById("pr-name").value.trim(),
      last_name:  document.getElementById("pr-last").value.trim(),
      email:      document.getElementById("pr-email").value.trim().toLowerCase(),
      password:   document.getElementById("pr-password").value,
      insurance:  document.getElementById("pr-insurance").value,
    };
    const ageVal = document.getElementById("pr-age").value;
    if (ageVal) payload.age = parseInt(ageVal, 10);

    const user = await apiCall("/users/register", payload);
    saveUserSession(user);
    setMsg("Cuenta creada. Redirigiendo...", "ok");
    window.location.replace("index.html");
  });

  const doctorLogin = withBusy("btn-dl", async () => {
    const email    = document.getElementById("dl-email").value.trim().toLowerCase();
    const password = document.getElementById("dl-password").value;
    const doctor = await apiCall("/doctors/login", { email, password });
    saveDoctorSession(doctor);
    setMsg("Sesión iniciada. Redirigiendo...", "ok");
    window.location.replace("doctor.html");
  });

  const doctorRegister = withBusy("btn-dr", async () => {
    const payload = {
      name:           document.getElementById("dr-name").value.trim(),
      last_name:      document.getElementById("dr-last").value.trim(),
      email:          document.getElementById("dr-email").value.trim().toLowerCase(),
      password:       document.getElementById("dr-password").value,
      license_number: document.getElementById("dr-license").value.trim(),
      specialty:      document.getElementById("dr-specialty").value,
      price_level:    parseInt(document.getElementById("dr-price").value, 10),
      is_network:     true,  // por defecto; el admin puede cambiarlo después
    };
    const phone = document.getElementById("dr-phone").value.trim();
    if (phone) payload.phone = phone;

    const doctor = await apiCall("/doctors/register", payload);
    saveDoctorSession(doctor);
    setMsg("Cuenta creada. Redirigiendo...", "ok");
    window.location.replace("doctor.html");
  });

  // Enter-key support: el submit nativo del form ya lo maneja (onsubmit).
</script>
</body>
</html>
