# Lineal — Local Development Stack
# Production: Deploy to IBM Cloud Code Engine via `ibmcloud ce app create`

services:
  lineal-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lineal-local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Hot-reload for local development
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      # Credenciales Gemini (service account JSON)
      - ./Gemini:/app/Gemini:ro
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--log-level", "debug"]
    restart: unless-stopped
